<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="config.js"></script>
<style>
  :root {
    --rose:       #b85c6e;
    --rose-deep:  #8a3f51;
    --rose-light: #f7eef0;
    --rose-mist:  #fdf5f6;
    --ink:        #0e0c0b;
    --ink-mid:    #3a3330;
    --ink-light:  #7a6e6a;
    --cream:      #f5f1ec;
    --border:     #e2dbd4;
    --white:      #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; font-weight: 300; color: var(--ink); background: var(--white); line-height: 1.7; }
  a { color: inherit; text-decoration: none; }

  .label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose); }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 64px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw;
    background: var(--ink);
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.08em; color: var(--white); }
  .nav-logo em { color: var(--rose); font-style: normal; }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a { font-size: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.5); transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .lang-pill { display: flex; gap: 0; }
  .lang-btn { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; background: none; border: 0.5px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); padding: 4px 8px; cursor: pointer; transition: all 0.15s; }
  .lang-btn.active { color: var(--rose); border-color: var(--rose); }
  .nav-cta { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; background: var(--rose); color: var(--white); padding: 0.55rem 1.3rem; transition: background 0.2s; }
  .nav-cta:hover { background: var(--rose-deep); }
  .mobile-controls { display: none; align-items: center; gap: 10px; }
  .mobile-menu-btn { display: flex; background: none; border: none; cursor: pointer; flex-direction: column; gap: 4px; padding: 4px; }
  .mobile-menu-btn span { display: block; width: 22px; height: 1px; background: rgba(255,255,255,0.6); }

  /* ── HERO ── */
  .hero {
    padding-top: 64px;
    min-height: 100vh;
    background: var(--ink);
    display: grid;
    grid-template-rows: 1fr auto;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(184,92,110,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(184,92,110,0.06) 0%, transparent 40%);
  }
  .hero-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; justify-content: center;
    padding: 6rem 5vw 4rem;
  }
  .hero-eyebrow { margin-bottom: 2rem; }
  .hero-eyebrow .label { color: var(--rose); }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 15vw, 14rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 3rem;
  }
  .hero-title .accent { color: var(--rose); display: block; }
  .hero-bottom {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .hero-sub-col {
    padding: 2.5rem 5vw;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .hero-sub {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.9;
    max-width: 38ch;
    margin-bottom: 2rem;
  }
  .hero-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--rose); color: var(--white); padding: 0.85rem 1.8rem; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.2s; border: none; cursor: pointer; }
  .btn-primary:hover { background: var(--rose-deep); }
  .btn-outline { display: inline-flex; align-items: center; gap: 0.5rem; background: transparent; color: rgba(255,255,255,0.6); padding: 0.85rem 1.8rem; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s; cursor: pointer; }
  .btn-outline:hover { border-color: rgba(255,255,255,0.6); color: var(--white); }
  .hero-stats-col { padding: 2.5rem 5vw; display: flex; align-items: center; gap: 3rem; flex-wrap: wrap; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--white); line-height: 1; }
  .stat-lbl { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-top: 0.2rem; }

  /* ── ZEITEN ── */
  .times-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); background: var(--cream); }
  .times-card {
    padding: 3rem 3.5rem;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .times-card:hover { background: var(--white); }
  .times-card-label { margin-bottom: 1.5rem; }
  .times-name { font-family: 'Fraunces', serif; font-size: 1.3rem; color: var(--ink); margin-bottom: 0.75rem; }
  .times-days { font-size: 0.85rem; font-weight: 500; color: var(--ink-mid); margin-bottom: 0.2rem; }
  .times-hours { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 0.75rem; }
  .times-ins { font-size: 0.68rem; letter-spacing: 0.06em; color: var(--rose); border: 0.5px solid var(--rose-light); padding: 0.2rem 0.6rem; display: inline-block; background: var(--rose-mist); }
  .times-contact-card {
    padding: 3rem 3.5rem;
    background: var(--rose);
    display: flex; flex-direction: column; justify-content: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .times-contact-line { font-size: 0.85rem; color: rgba(255,255,255,0.85); }
  .times-contact-line a { color: var(--white); }
  .times-contact-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 0.5rem; }

  /* ── SECTIONS ── */
  .section { padding: 7rem 5vw; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-header { margin-bottom: 4rem; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); line-height: 0.9; letter-spacing: 0.03em; color: var(--ink); }

  /* ── LEISTUNGEN ── */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .service-item { background: var(--white); padding: 2rem; display: flex; flex-direction: column; gap: 0.75rem; transition: background 0.15s; }
  .service-item:hover { background: var(--ink); }
  .service-item:hover .service-name { color: var(--white); }
  .service-item:hover .service-desc { color: rgba(255,255,255,0.5); }
  .service-item:hover .service-icon { color: var(--rose); }
  .service-icon { font-size: 1.4rem; color: var(--rose); }
  .service-name { font-family: 'Fraunces', serif; font-size: 1.05rem; color: var(--ink); transition: color 0.15s; }
  .service-desc { font-size: 0.8rem; color: var(--ink-light); line-height: 1.65; transition: color 0.15s; }

  /* ── TEAM ── */
  .team-section { padding: 7rem 5vw; background: var(--cream); }
  .team-inner { max-width: 1200px; margin: 0 auto; }
  .team-header { margin-bottom: 4rem; }
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2rem; }
  .team-card { background: var(--white); border: 1px solid var(--border); overflow: hidden; }
  .team-photo { width: 100%; aspect-ratio: 4/5; background: var(--ink); display: flex; align-items: center; justify-content: center; position: relative; }
  .team-initials { font-family: 'Bebas Neue', sans-serif; font-size: 6rem; color: rgba(255,255,255,0.08); letter-spacing: 0.05em; }
  .team-color-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; }
  .team-info { padding: 2rem; }
  .team-role { margin-bottom: 0.4rem; }
  .team-name { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--ink); margin-bottom: 1rem; }
  .team-bio { font-size: 0.85rem; color: var(--ink-light); line-height: 1.85; margin-bottom: 1.5rem; }
  .team-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .team-tag { font-size: 0.68rem; border: 0.5px solid var(--border); padding: 0.2rem 0.6rem; color: var(--ink-light); }

  /* ── PORTAL ── */
  .portal-section { padding: 7rem 5vw; background: var(--ink); position: relative; overflow: hidden; }
  .portal-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 60% 50%, rgba(184,92,110,0.15) 0%, transparent 60%); }
  .portal-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
  .portal-text .label { color: rgba(255,255,255,0.4); margin-bottom: 1.5rem; display: block; }
  .portal-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 6vw, 5.5rem); line-height: 0.9; letter-spacing: 0.03em; color: var(--white); margin-bottom: 1.5rem; }
  .portal-title em { color: var(--rose); font-style: normal; display: block; }
  .portal-sub { font-size: 0.92rem; color: rgba(255,255,255,0.5); line-height: 1.85; margin-bottom: 2rem; }
  .portal-features { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
  .portal-feature { display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem; color: rgba(255,255,255,0.6); }
  .portal-dot { width: 6px; height: 6px; background: var(--rose); flex-shrink: 0; }
  .portal-visual { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); padding: 3rem; text-align: center; }
  .portal-visual-icon { font-size: 3rem; color: var(--rose); margin-bottom: 1rem; display: block; }
  .portal-badge { font-family: 'Fraunces', serif; font-size: 1.3rem; font-style: italic; color: rgba(255,255,255,0.6); margin-bottom: 2rem; }

  /* ── REVIEWS ── */
  .reviews-section { padding: 5rem 5vw; background: var(--cream); }
  .reviews-inner { max-width: 1200px; margin: 0 auto; }
  .reviews-header { margin-bottom: 3rem; }
  .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .review-card { background: var(--white); padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
  .review-stars { color: #f59e0b; font-size: 0.9rem; letter-spacing: 3px; }
  .review-text { font-family: 'Fraunces', serif; font-size: 1rem; font-style: italic; color: var(--ink); line-height: 1.7; flex: 1; }
  .review-footer { display: flex; justify-content: space-between; }
  .review-name { font-size: 0.78rem; font-weight: 500; }
  .review-date { font-size: 0.68rem; color: var(--ink-light); }

  /* ── KONTAKT ── */
  .contact-section { padding: 7rem 5vw; }
  .contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; }
  .contact-header { margin-bottom: 3rem; }
  .contact-block { margin-bottom: 2rem; }
  .contact-block .label { display: block; margin-bottom: 0.6rem; }
  .contact-block p { font-size: 0.9rem; color: var(--ink-mid); line-height: 1.9; }
  .contact-block a { color: var(--rose); }
  .contact-map { aspect-ratio: 4/3; background: var(--cream); border: 1px solid var(--border); overflow: hidden; }
  .contact-map iframe { width: 100%; height: 100%; border: 0; }

  /* ── FOOTER ── */
  footer { padding: 2.5rem 5vw; background: var(--ink); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); }
  .footer-links { display: flex; gap: 2rem; }
  .footer-links a { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.25); transition: color 0.2s; }
  .footer-links a:hover { color: rgba(255,255,255,0.6); }
  .footer-lang { display: flex; }
  .footer-lang a { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 2px 8px; border: 0.5px solid rgba(255,255,255,0.1); transition: all 0.15s; }
  .footer-lang a.active { color: var(--rose); border-color: var(--rose); }

  /* ── MODALS ── */
  .modal-backdrop { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(14,12,11,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 2rem; }
  .modal-backdrop.open { display: flex; }
  .modal-box { background: var(--white); max-width: 680px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.75rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--white); }
  .modal-header h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 400; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--ink-light); padding: 4px; }
  .modal-body { padding: 2rem; font-size: 0.88rem; color: var(--ink-mid); line-height: 1.9; }
  .modal-body h3 { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 400; color: var(--ink); margin: 1.5rem 0 0.5rem; }
  .modal-body h3:first-child { margin-top: 0; }
  .modal-body p { margin-bottom: 0.75rem; }
  .modal-body a { color: var(--rose); }

  @media (max-width: 900px) {
    .hero-bottom { grid-template-columns: 1fr; }
    .hero-sub-col { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .portal-inner { grid-template-columns: 1fr; gap: 3rem; }
    .contact-inner { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .nav-right { display: none; }
    .mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" id="nav-logo">ORDINATION <em>DR.</em></div>
  <div class="nav-links" id="nav-links">
    <a href="#leistungen" id="nav-services">Leistungen</a>
    <a href="#team" id="nav-about">Über uns</a>
    <a href="#kontakt" id="nav-contact">Kontakt</a>
  </div>
  <div class="nav-right">
    <div class="lang-pill" id="lang-pill-desktop"></div>
    <a href="#" id="nav-portal-btn" class="nav-cta portal-link" target="_blank" rel="noopener noreferrer">Portal</a>
  </div>
  <div class="mobile-controls">
    <div class="lang-pill" id="lang-pill-mobile"></div>
    <button class="mobile-menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-eyebrow"><span class="label" id="hero-eyebrow"></span></div>
    <h1 class="hero-title" id="hero-title"></h1>
  </div>
  <div class="hero-bottom">
    <div class="hero-sub-col">
      <p class="hero-sub" id="hero-sub"></p>
      <div class="hero-actions">
        <a href="#" id="hero-cta1" class="btn-primary portal-link" target="_blank" rel="noopener noreferrer"></a>
        <a href="#team" id="hero-cta2" class="btn-outline"></a>
      </div>
    </div>
    <div class="hero-stats-col" id="hero-stats"></div>
  </div>
</section>

<!-- ZEITEN -->
<div class="times-section" id="times-grid"></div>

<!-- LEISTUNGEN -->
<section class="section" id="leistungen">
  <div class="section-inner">
    <div class="section-header">
      <div>
        <span class="label" id="services-eyebrow"></span>
        <h2 class="section-title" id="services-title"></h2>
      </div>
    </div>
    <div class="services-grid" id="services-grid"></div>
  </div>
</section>

<!-- TEAM -->
<section class="team-section" id="team">
  <div class="team-inner">
    <div class="team-header">
      <span class="label" id="team-eyebrow"></span>
      <h2 class="section-title" id="team-title"></h2>
    </div>
    <div class="team-grid" id="team-grid"></div>
  </div>
</section>

<!-- PORTAL -->
<section class="portal-section" id="portal">
  <div class="portal-bg"></div>
  <div class="portal-inner">
    <div class="portal-text">
      <span class="label" id="portal-eyebrow"></span>
      <h2 class="portal-title" id="portal-title"></h2>
      <p class="portal-sub" id="portal-sub"></p>
      <div class="portal-features" id="portal-features"></div>
      <a href="#" id="portal-cta" class="btn-primary portal-link" target="_blank" rel="noopener noreferrer"></a>
    </div>
    <div class="portal-visual">
      <i class="ti ti-shield-check portal-visual-icon"></i>
      <p class="portal-badge" id="portal-badge"></p>
      <a href="#" id="portal-overlay-btn" class="btn-primary portal-link" target="_blank" rel="noopener noreferrer" style="display:inline-flex"></a>
    </div>
  </div>
</section>

<!-- REVIEWS -->
<section class="reviews-section" id="reviews" style="display:none">
  <div class="reviews-inner">
    <div class="reviews-header">
      <span class="label">Bewertungen</span>
      <h2 class="section-title">Was unsere Patientinnen<br>über uns sagen.</h2>
    </div>
    <div class="reviews-grid" id="reviews-grid"></div>
  </div>
</section>

<!-- KONTAKT -->
<section class="contact-section" id="kontakt">
  <div class="contact-inner">
    <div>
      <div class="contact-header">
        <span class="label" id="contact-eyebrow"></span>
        <h2 class="section-title" id="contact-title"></h2>
      </div>
      <div class="contact-block"><span class="label" id="contact-addr-title"></span><p id="contact-addr"></p></div>
      <div class="contact-block"><span class="label" id="contact-tel-title"></span><p id="contact-tel"></p></div>
      <div class="contact-block"><span class="label" id="contact-times-title"></span><p id="contact-times"></p></div>
      <a href="#" id="contact-cta" class="btn-primary portal-link" target="_blank" rel="noopener noreferrer" style="margin-top:1rem;display:inline-flex"></a>
    </div>
    <div class="contact-map"><iframe id="maps-iframe" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade" sandbox="allow-scripts allow-same-origin"></iframe></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo" id="footer-logo"></div>
  <div class="footer-links">
    <a href="#" id="footer-impressum" onclick="openModal('impressum');return false;"></a>
    <a href="#" id="footer-datenschutz" onclick="openModal('datenschutz');return false;"></a>
    <a href="#" id="footer-partner" onclick="openModal('partner');loadPartners();return false;"></a>
  </div>
  <div class="footer-lang" id="footer-lang"></div>
</footer>

<!-- MODALS -->
<div class="modal-backdrop" id="modal-impressum" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><div class="modal-header"><h2 id="modal-impressum-title">Impressum</h2><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-impressum-body"></div></div>
</div>
<div class="modal-backdrop" id="modal-datenschutz" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><div class="modal-header"><h2 id="modal-datenschutz-title">Datenschutz</h2><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-datenschutz-body"></div></div>
</div>
<div class="modal-backdrop" id="modal-partner" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" style="max-width:720px"><div class="modal-header"><h2 id="modal-partner-title">Partner</h2><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div id="partner-list"></div></div></div>
</div>

<script>
const _p = new URLSearchParams(window.location.search);
const _urlLang = _p.get('lang');
const _urlColor = _p.get('color');
const _urlFont = _p.get('font');
let lang = (ORDI_CONFIG.languages||['de']).includes(_urlLang) ? _urlLang : (ORDI_CONFIG.defaultLang||'de');
if (_urlColor) ORDI_CONFIG.colorPrimary = decodeURIComponent(_urlColor);

function t(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[lang] || obj['de'] || '';
}

function applyColors() {
  const r = document.documentElement.style;
  r.setProperty('--rose', ORDI_CONFIG.colorPrimary || '#b85c6e');
  r.setProperty('--rose-deep', ORDI_CONFIG.colorPrimaryDark || '#8a3f51');
  r.setProperty('--rose-light', ORDI_CONFIG.colorPrimaryLight || '#f7eef0');
  r.setProperty('--rose-mist', ORDI_CONFIG.colorPrimaryMist || '#fdf5f6');
}

function buildLangPills() {
  const langs = ORDI_CONFIG.languages || ['de'];
  if (langs.length < 2) return;
  const html = langs.map(l =>
    '<button class="lang-btn' + (l===lang?' active':'') + '" onclick="setLang(\'' + l + '\')">' + l.toUpperCase() + '</button>'
  ).join('');
  ['lang-pill-desktop','lang-pill-mobile'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
  });
}

function renderPage() {
  const C = ORDI_CONFIG;
  const TX = C.texts || {};
  document.title = C.name + ' – ' + C.specialty;
  document.documentElement.lang = lang;

  const portalUrl = C.portalUrl ? C.portalUrl + '?lang=' + lang : '#';
  document.querySelectorAll('.portal-link').forEach(a => { a.href = portalUrl; if (!C.portalUrl) a.style.display='none'; });

  // Nav
  document.getElementById('nav-logo').innerHTML = C.name.toUpperCase().replace(/\s+/, ' <em>') + '</em>';
  ['nav-services','nav-about','nav-contact'].forEach((id, i) => {
    const keys = ['services','about','contact'];
    const el = document.getElementById(id);
    if (el) el.textContent = t(TX.nav?.[keys[i]]) || ['Leistungen','Über uns','Kontakt'][i];
  });
  const nb = document.getElementById('nav-portal-btn');
  if (nb) { nb.textContent = t(TX.nav?.portal) || 'Portal'; if (!C.portalUrl) nb.style.display='none'; }

  // Hero
  document.getElementById('hero-eyebrow').textContent = t(TX.hero?.eyebrow) || C.specialty;
  const heroTitle = t(TX.hero?.h1) || C.name;
  document.getElementById('hero-title').innerHTML = heroTitle.replace(/<br>/g, '\n').replace(/\n/g, '<br>').replace(/<em>(.*?)<\/em>/g, '<span class="accent">$1</span>');
  document.getElementById('hero-sub').textContent = t(TX.hero?.sub) || '';
  document.getElementById('hero-cta1').textContent = t(TX.hero?.cta1) || 'Termin anfragen';
  document.getElementById('hero-cta2').textContent = t(TX.hero?.cta2) || 'Mehr erfahren';
  document.getElementById('hero-stats').innerHTML = (C.stats||[]).map(s =>
    '<div class="stat"><div class="stat-num">' + s.number + '</div><div class="stat-lbl">' + t(s.label) + '</div></div>'
  ).join('');

  // Zeiten
  document.getElementById('times-grid').innerHTML = C.doctors.map(d =>
    '<div class="times-card">' +
    '<div class="times-card-label"><span class="label">' + t(d.role) + '</span></div>' +
    '<div class="times-name">' + d.title + ' ' + d.name + '</div>' +
    '<div class="times-days">' + t(d.days) + '</div>' +
    '<div class="times-hours">' + t(d.hours) + '</div>' +
    '<span class="times-ins">' + t(d.insurance) + '</span>' +
    '</div>'
  ).join('') +
  '<div class="times-contact-card">' +
  '<div class="times-contact-label">' + (t(TX.contact?.tel_title)||'Kontakt') + '</div>' +
  '<div class="times-contact-line">📞 <a href="tel:' + C.phone + '">' + C.phone + '</a></div>' +
  '<div class="times-contact-line">✉ <a href="mailto:' + C.email + '">' + C.email + '</a></div>' +
  '<div class="times-contact-line">📍 ' + C.address + '</div>' +
  '</div>';

  // Leistungen
  document.getElementById('services-eyebrow').textContent = t(TX.services?.eyebrow) || 'Leistungen';
  document.getElementById('services-title').innerHTML = t(TX.services?.h2) || 'Unser Angebot';
  document.getElementById('services-grid').innerHTML = (C.services||[]).map(s =>
    '<div class="service-item"><i class="ti ' + s.icon + ' service-icon"></i><div class="service-name">' + t(s.name) + '</div><div class="service-desc">' + t(s.desc) + '</div></div>'
  ).join('');

  // Team
  document.getElementById('team-eyebrow').textContent = t(TX.team?.eyebrow) || 'Das Team';
  document.getElementById('team-title').innerHTML = t(TX.team?.h2) || 'Ihre Ärzte';
  document.getElementById('team-grid').innerHTML = C.doctors.map(d =>
    '<div class="team-card">' +
    '<div class="team-photo"><div class="team-initials">' + d.initials + '</div><div class="team-color-bar" style="background:' + d.color + '"></div></div>' +
    '<div class="team-info">' +
    '<div class="team-role"><span class="label">' + t(d.role) + '</span></div>' +
    '<div class="team-name">' + d.title + ' ' + d.name + '</div>' +
    '<div class="team-bio">' + t(d.bio) + '</div>' +
    '<div class="team-tags">' + (t(d.tags)||[]).map(tag => '<span class="team-tag">'+tag+'</span>').join('') + '</div>' +
    '</div></div>'
  ).join('');

  // Portal
  if (C.portalUrl) {
    document.getElementById('portal-eyebrow').textContent = t(TX.portal?.eyebrow) || 'Online';
    document.getElementById('portal-title').innerHTML = (t(TX.portal?.h2)||'Jetzt Online').replace(/<br>/g,'<br>').replace(/<em>(.*?)<\/em>/g,'<em>$1</em>');
    document.getElementById('portal-sub').textContent = t(TX.portal?.sub) || '';
    document.getElementById('portal-features').innerHTML = (t(TX.portal?.features)||[]).map(f =>
      '<div class="portal-feature"><div class="portal-dot"></div>' + f + '</div>'
    ).join('');
    document.getElementById('portal-cta').textContent = t(TX.portal?.cta) || 'Portal öffnen';
    document.getElementById('portal-badge').textContent = t(TX.portal?.badge) || '';
    document.getElementById('portal-overlay-btn').textContent = t(TX.portal?.cta) || 'Zum Portal';
  } else {
    document.querySelector('.portal-section').style.display = 'none';
  }

  // Kontakt
  document.getElementById('contact-eyebrow').textContent = t(TX.contact?.eyebrow) || 'Kontakt';
  document.getElementById('contact-title').innerHTML = t(TX.contact?.h2) || 'Besuchen Sie uns';
  document.getElementById('contact-addr-title').textContent = t(TX.contact?.addr_title) || 'Adresse';
  document.getElementById('contact-addr').innerHTML = C.address + '<br>' + C.zip + ' ' + C.cityName + (C.mapsHint ? '<br><br>' + C.mapsHint : '');
  document.getElementById('contact-tel-title').textContent = t(TX.contact?.tel_title) || 'Telefon';
  document.getElementById('contact-tel').innerHTML = '<a href="tel:' + C.phone + '">' + C.phone + '</a><br><a href="mailto:' + C.email + '">' + C.email + '</a>';
  document.getElementById('contact-times-title').textContent = t(TX.contact?.times_title) || 'Zeiten';
  document.getElementById('contact-times').innerHTML = C.doctors.map(d =>
    '<strong>' + d.title + ' ' + d.name + '</strong><br>' + t(d.days) + ', ' + t(d.hours)
  ).join('<br><br>');
  document.getElementById('contact-cta').textContent = t(TX.contact?.cta) || 'Termin anfragen';
  if (C.mapsEmbed) document.getElementById('maps-iframe').src = C.mapsEmbed;

  // Footer
  document.getElementById('footer-logo').textContent = C.name.toUpperCase() + ' · ' + C.specialty.toUpperCase();
  document.getElementById('footer-impressum').textContent = t(TX.footer?.impressum) || 'Impressum';
  document.getElementById('footer-datenschutz').textContent = t(TX.footer?.datenschutz) || 'Datenschutz';
  document.getElementById('footer-partner').textContent = t(TX.footer?.partner) || 'Partner';
  document.getElementById('footer-lang').innerHTML = (C.languages||['de']).map(l =>
    '<a href="#" onclick="setLang(\'' + l + '\');return false;" class="' + (l===lang?'active':'') + '">' + l.toUpperCase() + '</a>'
  ).join('');

  // Impressum
  const IMP = C.impressum || {};
  document.getElementById('modal-impressum-title').textContent = t(TX.footer?.impressum)||'Impressum';
  document.getElementById('modal-impressum-body').innerHTML =
    '<h3>Angaben gemäß § 5 ECG</h3><p><strong>'+(IMP.name||C.name)+'</strong><br>'+(IMP.title||C.specialty)+'<br>'+(IMP.address||C.address+', '+C.zip+' '+C.cityName)+'</p>'+
    '<h3>Kontakt</h3><p>Tel: <a href="tel:'+C.phone+'">'+C.phone+'</a><br>E-Mail: <a href="mailto:'+C.email+'">'+C.email+'</a></p>'+
    '<h3>Berufsrecht</h3><p>'+(IMP.chamber||'Ärztekammer für Wien')+'</p>'+
    '<p style="margin-top:1.5rem;font-size:0.78rem;color:var(--ink-light)">Stand: '+new Date().getFullYear()+'</p>';
  document.getElementById('modal-datenschutz-title').textContent = t(TX.footer?.datenschutz)||'Datenschutz';
  document.getElementById('modal-datenschutz-body').innerHTML =
    '<h3>Verantwortliche</h3><p><strong>'+C.name+'</strong><br>'+C.address+', '+C.zip+' '+C.cityName+'<br><a href="mailto:'+C.email+'">'+C.email+'</a></p>'+
    '<h3>Grundsatz</h3><p>Wir verarbeiten Ihre Daten auf Grundlage der DSGVO.</p>'+
    '<h3>Google Maps</h3><p>Diese Website verwendet Google Maps. <a href="https://policies.google.com/privacy" target="_blank">Google Datenschutz</a>.</p>'+
    '<p style="margin-top:1.5rem;font-size:0.78rem;color:var(--ink-light)">Stand: '+new Date().getFullYear()+'</p>';
  document.getElementById('modal-partner-title').textContent = t(TX.footer?.partner)||'Partner';

  // Reviews
  const reviews = C.reviews || [];
  const s = C.sections || {};
  const reviewsSection = document.getElementById('reviews');
  if (reviewsSection && s.reviews !== false && reviews.length > 0) {
    reviewsSection.style.display = 'block';
    document.getElementById('reviews-grid').innerHTML = reviews.map(r => {
      const stars = '★'.repeat(r.stars) + '☆'.repeat(5-r.stars);
      return '<div class="review-card"><div class="review-stars">'+stars+'</div><div class="review-text">'+r.text+'</div><div class="review-footer"><span class="review-name">'+r.name+'</span><span class="review-date">'+(r.date||'')+'</span></div></div>';
    }).join('');
  }

  // Lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === lang);
  });
  document.querySelectorAll('.footer-lang a').forEach(a => {
    a.classList.toggle('active', a.textContent.toLowerCase() === lang);
  });

  // Sections
  if (s.stats === false) { const el = document.getElementById('hero-stats'); if(el) el.style.display='none'; }
  if (s.team === false) { const el = document.getElementById('team'); if(el) el.style.display='none'; }
}

function setLang(l) { lang = l; renderPage(); }

function openModal(w) { document.getElementById('modal-'+w).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal() { document.querySelectorAll('.modal-backdrop').forEach(m=>m.classList.remove('open')); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

async function loadPartners() {
  var c = document.getElementById('partner-list');
  if (!c || c.dataset.loaded==='true') return;
  c.innerHTML = '<p style="color:var(--ink-light)">Wird geladen…</p>';
  try {
    var r = await fetch((ORDI_CONFIG.portalUrl||'').replace('frontend','backend').replace('-frontend','') + '/partners/public');
    var d = await r.json();
    c.innerHTML = (d.data||[]).map(p =>
      '<div style="background:var(--cream);border:0.5px solid var(--border);padding:1.2rem 1.4rem;margin-bottom:1rem">' +
      (p.specialty?'<div class="label" style="margin-bottom:0.3rem">'+p.specialty+'</div>':'') +
      '<div style="font-family:Fraunces,serif;font-size:1.1rem">'+p.name+'</div>' +
      (p.notes?'<div style="font-size:0.8rem;color:var(--ink-light);margin-top:0.2rem">'+p.notes+'</div>':'') +
      (p.address?'<div style="font-size:0.8rem;color:var(--ink-light);margin-top:0.4rem">📍 '+p.address+'</div>':'') +
      '</div>'
    ).join('');
    c.dataset.loaded='true';
  } catch(e) { c.innerHTML='<p style="color:var(--ink-light)">Nicht verfügbar.</p>'; }
}

function toggleMenu() {
  const l = document.getElementById('nav-links');
  if (l.style.display==='flex') l.style.display='none';
  else l.style.cssText='display:flex;flex-direction:column;position:fixed;top:64px;left:0;right:0;background:var(--ink);padding:1.5rem 5vw;gap:1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);z-index:99';
}

window.onload = function() { applyColors(); buildLangPills(); renderPage(); };
</script>
</body>
</html>
